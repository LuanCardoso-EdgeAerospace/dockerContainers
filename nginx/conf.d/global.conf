# Common SSL params in one place
ssl_certificate /etc/nginx/certs/srv1.internal.crt;
ssl_certificate_key /etc/nginx/certs/srv1.internal.key;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;

# for uploading files to eg xwiki
client_max_body_size 0;

# GITLAB
server {
    listen 443 ssl;
    http2 on;
    server_name git.srv1.internal;

    location / {
        proxy_read_timeout      300;
        proxy_connect_timeout   300;
        proxy_redirect          off;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Ssl   on;
        proxy_set_header X-Frame-Options   SAMEORIGIN;

        proxy_pass http://gitlab_upstream;
    }
}
# Internal upstream for GitLab
upstream gitlab_upstream {
    server gitlab:80;
}

# COCKPIT
server {
    listen 443 ssl ;
    http2 on;
    server_name cockpit.srv1.internal;

    location / {
        proxy_pass http://192.168.2.2:9090;
    }
}
server {
    listen 80 ;
    http2 on;
    server_name cockpit.srv1.internal;

    location / {
        proxy_pass http://192.168.2.2:9090;
    }
}

# Wiki
server {
    listen 443 ssl ;
    http2 on;
    server_name wiki.srv1.internal xwiki.srv1.internal;

    location / {
        proxy_pass http://wikiupstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
    }
}

server {
    listen 443 ssl ;
    http2 on;
    server_name srv1.internal;

    location / {
        proxy_pass http://wikiupstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
    }
}
# Internal upstream for Wiki
upstream wikiupstream {
    server wiki:8080;
}


# partdb
server {
    listen 443 ssl ;
    http2 on;
    server_name partdb.srv1.internal;

    location / {
        proxy_pass http://partdb_upstream;
    }
}

# Internal upstream for partdb
upstream partdb_upstream {
